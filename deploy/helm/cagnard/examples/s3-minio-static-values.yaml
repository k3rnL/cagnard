backend:
  image:
    repository: ghcr.io/k3rnl/cagnard-backend
    tag: v0.6.2
    pullPolicy: IfNotPresent
  config:
    inline:
      enabled: true
      content: |
        server {
          host = "0.0.0.0"
          port = 8080
        }

        appearance {
          defaultPalette = solar
          defaultMode = system
          allowUserOverride = true
        }

        auth {
          mode = static
          configuredUsersEnabled = true
          defaultUser = null
          session {
            signingSecret = "s3-minio-static-demo-session-secret-change-me"
            ttlSeconds = 28800
            cookieName = CAGNARD_SESSION
            secureCookies = false
          }
          staticProvider {
            id = static
            label = "Cagnard account"
            enabled = true
          }
          oidcProviders = []
        }

        users = [
          {
            id = alice
            displayName = "Alice Example"
            roles = [user, admin]
            groups = [engineering]
            claims { email = "alice@example.test" }
            credential {
              verifier = "pbkdf2-sha256:120000:Y2FnbmFyZC1kZW1vLXN0YXRpYy11c2VyLXNhbHQ:fUdgpOu_Z3MHhgdWzUku12tWnSH5s9BhfjJVv1fiIms"
            }
          }
        ]

        providers = [
          {
            id = s3-main
            type = s3
            family = s3
            displayName = "MinIO S3"
            settings {
              region = "us-east-1"
              endpoint = "http://minio:9000"
              pathStyleAccess = "true"
              sslEnabled = "false"
              trustAllCertificates = "false"
              requestChecksumCalculation = "when_required"
              maxBufferedObjectBytes = "67108864"
            }
          }
        ]

        accounts = [
          {
            id = s3-main-account
            providerId = s3-main
            displayName = "MinIO demo account"
            enabled = true
            readOnly = false
            authMode = static
            settings {
              credentialMode = static
              accessKeyId = "cagnard"
              secretAccessKey = "cagnard-secret"
            }
          }
        ]

        personalStorage = [
          {
            id = s3-documents
            label = "S3 Documents"
            providerId = s3-main
            accountId = s3-main-account
            settings {
              bucket = "cagnard-demo"
              prefix = "documents"
            }
            allowedUsers = [alice]
          }
        ]

        globalStorage = []

frontend:
  image:
    repository: ghcr.io/k3rnl/cagnard-frontend
    tag: v0.6.2
    pullPolicy: IfNotPresent

ingress:
  enabled: false
