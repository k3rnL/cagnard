backend:
  image:
    repository: ghcr.io/k3rnl/cagnard-backend
    tag: v0.6.2
    pullPolicy: IfNotPresent
  config:
    inline:
      enabled: true
      content: |
        server {
          host = "0.0.0.0"
          port = 8080
        }

        appearance {
          defaultPalette = classic
          defaultMode = system
          allowUserOverride = true
        }

        auth {
          mode = static
          configuredUsersEnabled = true
          defaultUser = null
          session {
            signingSecret = "local-filesystem-static-demo-session-secret-change-me"
            ttlSeconds = 28800
            cookieName = CAGNARD_SESSION
            secureCookies = false
          }
          staticProvider {
            id = static
            label = "Cagnard account"
            enabled = true
          }
          oidcProviders = []
        }

        users = [
          {
            id = alice
            displayName = "Alice Example"
            roles = [user, admin]
            groups = [engineering]
            claims { email = "alice@example.test" }
            credential {
              verifier = "pbkdf2-sha256:120000:Y2FnbmFyZC1kZW1vLXN0YXRpYy11c2VyLXNhbHQ:fUdgpOu_Z3MHhgdWzUku12tWnSH5s9BhfjJVv1fiIms"
            }
          }
        ]

        providers = [
          { id = local, type = filesystem, family = unix, displayName = "Local filesystem" }
        ]

        accounts = [
          {
            id = local-admin
            providerId = local
            displayName = "Local process account"
            enabled = true
            readOnly = false
            authMode = local-process
          }
        ]

        personalStorage = [
          {
            id = home
            label = "Home"
            providerId = local
            accountId = local-admin
            path = "/data/cagnard/home/{user.id}"
            allowedUsers = [alice]
          }
        ]

        globalStorage = [
          {
            id = shared
            label = "Global"
            providerId = local
            accountId = local-admin
            path = "/data/cagnard/global"
            allowedRoles = [user, admin]
          }
        ]

        uiPlugins = [
          {
            id = jsonl-text
            label = "JSON Lines"
            kind = opener
            apiVersion = "1"
            enabled = true
            extensions = [".jsonl"]
            permissions = [read]
            priority = 15
            view = text
            readStrategy = bounded
            maxSizeBytes = 524288
          }
        ]
  extraVolumes:
    - name: example-home
      emptyDir: {}
    - name: example-global
      emptyDir: {}
  extraVolumeMounts:
    - name: example-home
      mountPath: /data/cagnard/home/alice
    - name: example-global
      mountPath: /data/cagnard/global

frontend:
  image:
    repository: ghcr.io/k3rnl/cagnard-frontend
    tag: v0.6.2
    pullPolicy: IfNotPresent

ingress:
  enabled: false
