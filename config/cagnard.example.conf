# Cagnard stateless backend configuration.
# HOCON supports comments, includes, and substitutions.

server {
  host = "0.0.0.0"
  port = 8080
}

auth {
  configuredUsersEnabled = true
  defaultUser = alice

  oidcProviders = [
    {
      id = keycloak
      issuer = "https://keycloak.example.test/realms/cagnard"
      audience = cagnard
      groupsClaim = groups
    }
  ]
}

users = [
  {
    id = alice
    displayName = "Alice Example"
    roles = [user, admin]
    groups = [engineering]
    claims {
      email = "alice@example.test"
    }
  }
]

providers = [
  {
    id = local
    type = filesystem
    family = unix
    displayName = "Local filesystem"
  }
]

accounts = [
  {
    id = local-admin
    providerId = local
    displayName = "Local process account"
    enabled = true
    readOnly = false
    authMode = local-process
  }
]

personalStorage = [
  {
    id = home
    label = Home
    providerId = local
    accountId = local-admin
    path = "../examples/storage/home/{user.id}"
    allowedUsers = [alice]
  }
]

globalStorage = [
  {
    id = shared
    label = Global
    providerId = local
    accountId = local-admin
    path = "../examples/storage/global"
    allowedRoles = [user, admin]
  }
]

uiPlugins = [
  {
    id = text-preview
    label = "Text preview"
    kind = preview
    apiVersion = "1"
    enabled = true
    mimeTypes = ["text/plain", "text/markdown"]
    extensions = [".txt", ".md"]
    permissions = [read]
    priority = 10
  }
]
