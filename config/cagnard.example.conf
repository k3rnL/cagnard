# Cagnard stateless backend configuration.
# HOCON supports comments, includes, and substitutions.

server {
  host = "0.0.0.0"
  port = 8080
}

tasks {
  maxConcurrentTransfers = 4
}

auth {
  # Modes:
  # - static: explicit username/password login for configured users.
  # - development: local header/default-user fallback.
  # - external: reserved for future OIDC/SSO providers.
  mode = static
  configuredUsersEnabled = true
  defaultUser = null

  session {
    # Demo-only value. Use an environment substitution or mounted secret in deployments.
    signingSecret = "dev-only-change-me-cagnard-session-signing-secret"
    ttlSeconds = 28800
    cookieName = CAGNARD_SESSION
    secureCookies = false
  }

  staticProvider {
    id = static
    label = "Cagnard account"
    enabled = true
  }

  oidcProviders = [
    {
      id = keycloak
      issuer = "https://keycloak.example.test/realms/cagnard"
      audience = cagnard
      groupsClaim = groups
    }
  ]
}

users = [
  {
    id = alice
    displayName = "Alice Example"
    roles = [user, admin]
    groups = [engineering]
    claims {
      email = "alice@example.test"
    }
    # Demo password: cagnard
    credential {
      verifier = "pbkdf2-sha256:120000:Y2FnbmFyZC1kZW1vLXN0YXRpYy11c2VyLXNhbHQ:fUdgpOu_Z3MHhgdWzUku12tWnSH5s9BhfjJVv1fiIms"
    }
  }
]

providers = [
  {
    id = local
    type = filesystem
    family = unix
    displayName = "Local filesystem"
  }
]

accounts = [
  {
    id = local-admin
    providerId = local
    displayName = "Local process account"
    enabled = true
    readOnly = false
    authMode = local-process
  }
]

personalStorage = [
  {
    id = home
    label = Home
    providerId = local
    accountId = local-admin
    path = "../examples/storage/home/{user.id}"
    allowedUsers = [alice]
  }
]

globalStorage = [
  {
    id = shared
    label = Global
    providerId = local
    accountId = local-admin
    path = "../examples/storage/global"
    allowedRoles = [user, admin]
  }
]

# Opener plugins share one registry with the first-party openers (text,
# markdown, json, csv, media, pdf, archive). A plugin competes on `priority`
# alone (lower wins; first-party openers use 10-200) and declares which
# rendering `view` it targets: text, json, csv, markdown, media, pdf, archive.
#
# Optional fields and their defaults:
# - view: rendering surface, defaults to "text"
# - readStrategy: bounded (default) | download | metadata
# - mode: viewer (default) | editor
# - editMode: none (default) | text | structured | export-only
# - saveStrategy: none (default) | overwrite | export-only
# - maxSizeBytes: bounded openers default to 524288; download/metadata are uncapped
# - requiredCapabilities: defaults derived from readStrategy
uiPlugins = [
  {
    # JSON Lines files classify as JSON, but the structured JSON tree view
    # cannot parse one-object-per-line content. This plugin outranks the
    # first-party JSON opener (priority 20) and routes them to the text view.
    id = jsonl-text
    label = "JSON Lines"
    kind = opener
    apiVersion = "1"
    enabled = true
    extensions = [".jsonl"]
    permissions = [read]
    priority = 15
    view = text
    readStrategy = bounded
    maxSizeBytes = 524288
  }
]
