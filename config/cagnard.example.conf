# Cagnard stateless backend configuration.
# HOCON supports comments, includes, and substitutions.

server {
  host = "0.0.0.0"
  port = 8080
}

tasks {
  maxConcurrentTransfers = 4
}

appearance {
  defaultPalette = classic
  defaultMode = system
  allowUserOverride = true
}

auth {
  # Modes:
  # - static: explicit username/password login for configured users.
  # - development: local header/default-user fallback.
  # - external: reserved for future OIDC/SSO providers.
  mode = static
  configuredUsersEnabled = true
  defaultUser = null

  session {
    # Demo-only value. Use an environment substitution or mounted secret in deployments.
    signingSecret = "dev-only-change-me-cagnard-session-signing-secret"
    ttlSeconds = 28800
    cookieName = CAGNARD_SESSION
    secureCookies = false
  }

  staticProvider {
    id = static
    label = "Cagnard account"
    enabled = true
  }

  oidcProviders = [
    {
      id = keycloak
      issuer = "https://keycloak.example.test/realms/cagnard"
      audience = cagnard
      groupsClaim = groups
    }
  ]
}

users = [
  {
    id = alice
    displayName = "Alice Example"
    roles = [user, admin]
    groups = [engineering]
    claims {
      email = "alice@example.test"
    }
    # Demo password: cagnard
    credential {
      verifier = "pbkdf2-sha256:120000:Y2FnbmFyZC1kZW1vLXN0YXRpYy11c2VyLXNhbHQ:fUdgpOu_Z3MHhgdWzUku12tWnSH5s9BhfjJVv1fiIms"
    }
  }
]

providers = [
  {
    id = local
    type = filesystem
    family = unix
    displayName = "Local filesystem"
  }
]

accounts = [
  {
    id = local-admin
    providerId = local
    displayName = "Local process account"
    enabled = true
    readOnly = false
    authMode = local-process
  }
]

personalStorage = [
  {
    id = home
    label = Home
    providerId = local
    accountId = local-admin
    path = "../examples/storage/home/{user.id}"
    allowedUsers = [alice]
  }
]

globalStorage = [
  {
    id = shared
    label = Global
    providerId = local
    accountId = local-admin
    path = "../examples/storage/global"
    allowedRoles = [user, admin]
  }
]
