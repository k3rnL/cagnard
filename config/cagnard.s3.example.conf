# S3-compatible provider configuration snippet.
# Merge these sections into a full Cagnard HOCON config and provide secrets
# through environment variables, mounted files, or a secret manager.

providers = [
  {
    id = s3-main
    type = s3
    family = s3
    displayName = "S3 compatible"
    settings {
      region = ${?CAGNARD_S3_REGION}
      endpoint = ${?CAGNARD_S3_ENDPOINT}
      pathStyleAccess = true
      sslEnabled = true
      trustAllCertificates = false
      requestChecksumCalculation = "when_required"
      maxBufferedObjectBytes = 67108864
    }
  }
]

accounts = [
  {
    id = s3-main-account
    providerId = s3-main
    displayName = "S3 account"
    enabled = true
    readOnly = false
    authMode = static
    settings {
      credentialMode = static
      accessKeyId = ${?CAGNARD_S3_ACCESS_KEY}
      secretAccessKey = ${?CAGNARD_S3_SECRET_KEY}
      sessionToken = ${?CAGNARD_S3_SESSION_TOKEN}
    }
  }
]

personalStorage = [
  {
    id = s3-home
    # Optional. If omitted, Cagnard uses the bucket name as the display label.
    label = "Documents"
    providerId = s3-main
    accountId = s3-main-account
    settings {
      bucket = ${?CAGNARD_S3_BUCKET}
      prefix = ${?CAGNARD_S3_PREFIX}
    }
    allowedUsers = [alice]
  }
]
