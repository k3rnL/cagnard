schema: spec-driven

context: |
  Cagnard is a provider-neutral storage browser with a Go backend and a React frontend.
  User-facing changes must preserve the established visual language and feel integrated,
  elegant, responsive, accessible, and efficient rather than appearing as isolated features.

rules:
  proposal:
    - For changes that affect the frontend, explicitly state the expected UI/UX quality and consistency with existing Cagnard controls, themes, responsive behavior, and interaction patterns.
  specs:
    - For user-facing behavior, include testable requirements for visual integration, accessibility, responsive layouts, stable dimensions, and clear operation feedback where relevant.
  design:
    - For frontend changes, explain how the design reuses existing components and interaction patterns and avoids layering, overflow, hover, focus, loading, and layout regressions.
  tasks:
    - For frontend changes, include implementation work for consistent styling and controls plus in-app browser verification across desktop, mobile, and supported themes.
