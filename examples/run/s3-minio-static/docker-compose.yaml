services:
  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:latest}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cagnard}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cagnard-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: ${MINIO_MC_IMAGE:-quay.io/minio/mc:latest}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cagnard}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cagnard-secret}
      CAGNARD_S3_BUCKET: ${CAGNARD_S3_BUCKET:-cagnard-demo}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$CAGNARD_S3_BUCKET"
        mc mirror --overwrite /seed "local/$$CAGNARD_S3_BUCKET/documents"
        mc mirror --overwrite /structured-data "local/$$CAGNARD_S3_BUCKET/documents/structured-data"
    volumes:
      - ./seed:/seed:ro
      - ../../storage/global/structured-data:/structured-data:ro

  backend:
    image: ghcr.io/k3rnl/cagnard-backend:${CAGNARD_VERSION:-v0.6.2}
    environment:
      CAGNARD_CONFIG: /etc/cagnard/cagnard.conf
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./cagnard.conf:/etc/cagnard/cagnard.conf:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully

  frontend:
    image: ghcr.io/k3rnl/cagnard-frontend:${CAGNARD_VERSION:-v0.6.2}
    environment:
      CAGNARD_API_UPSTREAM: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      - backend

volumes:
  minio-data:
