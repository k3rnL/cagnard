server {
  host = "0.0.0.0"
  port = 8080
}

tasks {
  maxConcurrentItems = 4
}

appearance {
  defaultPalette = classic
  defaultMode = system
  allowUserOverride = true
}

auth {
  mode = static
  configuredUsersEnabled = true
  defaultUser = null

  session {
    signingSecret = "local-and-s3-static-demo-session-secret-change-me"
    ttlSeconds = 28800
    cookieName = CAGNARD_SESSION
    secureCookies = false
  }

  staticProvider {
    id = static
    label = "Cagnard account"
    enabled = true
  }

  oidcProviders = []
}

users = [
  {
    id = alice
    displayName = "Alice Example"
    roles = [user, admin]
    groups = [engineering]
    claims {
      email = "alice@example.test"
    }
    credential {
      # Demo password: cagnard
      verifier = "pbkdf2-sha256:120000:Y2FnbmFyZC1kZW1vLXN0YXRpYy11c2VyLXNhbHQ:fUdgpOu_Z3MHhgdWzUku12tWnSH5s9BhfjJVv1fiIms"
    }
  }
]

providers = [
  {
    id = local
    type = filesystem
    family = unix
    displayName = "Local filesystem"
  },
  {
    id = s3-main
    type = s3
    family = s3
    displayName = "MinIO S3"
    settings {
      region = "us-east-1"
      endpoint = "http://minio:9000"
      pathStyleAccess = "true"
      sslEnabled = "false"
      trustAllCertificates = "false"
      requestChecksumCalculation = "when_required"
      maxBufferedObjectBytes = "67108864"
    }
  }
]

accounts = [
  {
    id = local-admin
    providerId = local
    displayName = "Local process account"
    enabled = true
    readOnly = false
    authMode = local-process
  },
  {
    id = local-readonly
    providerId = local
    displayName = "Local read-only account"
    enabled = true
    readOnly = true
    authMode = local-process
  },
  {
    id = s3-main-account
    providerId = s3-main
    displayName = "MinIO demo account"
    enabled = true
    readOnly = false
    authMode = static
    settings {
      credentialMode = static
      accessKeyId = "cagnard"
      secretAccessKey = "cagnard-secret"
    }
  }
]

personalStorage = [
  {
    id = home
    label = "Home"
    providerId = local
    accountId = local-admin
    path = "/data/home/{user.id}"
    allowedUsers = [alice]
  },
  {
    id = s3-documents
    label = "S3 Documents"
    providerId = s3-main
    accountId = s3-main-account
    settings {
      bucket = "cagnard-combined"
      prefix = "documents"
    }
    allowedUsers = [alice]
  }
]

globalStorage = [
  {
    id = shared
    label = "Global"
    providerId = local
    accountId = local-readonly
    path = "/global"
    allowedRoles = [user, admin]
  },
  {
    id = s3-shared
    label = "S3 Shared"
    providerId = s3-main
    accountId = s3-main-account
    settings {
      bucket = "cagnard-combined"
      prefix = "shared"
    }
    allowedRoles = [user, admin]
  }
]
