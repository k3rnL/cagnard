server {
  host = "0.0.0.0"
  port = 8080
}

auth {
  mode = static
  configuredUsersEnabled = true
  defaultUser = null

  session {
    signingSecret = "local-filesystem-static-demo-session-secret-change-me"
    ttlSeconds = 28800
    cookieName = CAGNARD_SESSION
    secureCookies = false
  }

  staticProvider {
    id = static
    label = "Cagnard account"
    enabled = true
  }

  oidcProviders = []
}

users = [
  {
    id = alice
    displayName = "Alice Example"
    roles = [user, admin]
    groups = [engineering]
    claims {
      email = "alice@example.test"
    }
    credential {
      # Demo password: cagnard
      verifier = "pbkdf2-sha256:120000:Y2FnbmFyZC1kZW1vLXN0YXRpYy11c2VyLXNhbHQ:fUdgpOu_Z3MHhgdWzUku12tWnSH5s9BhfjJVv1fiIms"
    }
  }
]

providers = [
  {
    id = local
    type = filesystem
    family = unix
    displayName = "Local filesystem"
  }
]

accounts = [
  {
    id = local-admin
    providerId = local
    displayName = "Local process account"
    enabled = true
    readOnly = false
    authMode = local-process
  }
]

personalStorage = [
  {
    id = home
    label = "Home"
    providerId = local
    accountId = local-admin
    path = "/data/home/{user.id}"
    allowedUsers = [alice]
  }
]

globalStorage = [
  {
    id = shared
    label = "Global"
    providerId = local
    accountId = local-admin
    path = "/data/global"
    allowedRoles = [user, admin]
  }
]

uiPlugins = [
  {
    id = text-preview
    label = "Text preview"
    kind = preview
    apiVersion = "1"
    enabled = true
    mimeTypes = ["text/plain", "text/markdown", "application/json", "text/csv"]
    extensions = [".txt", ".md", ".json", ".csv"]
    permissions = [read]
    priority = 10
  }
]
