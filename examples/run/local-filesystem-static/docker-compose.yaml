services:
  backend:
    image: ghcr.io/k3rnl/cagnard-backend:${CAGNARD_VERSION:-v0.6.2}
    environment:
      CAGNARD_CONFIG: /etc/cagnard/cagnard.conf
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./cagnard.conf:/etc/cagnard/cagnard.conf:ro
      - ./data:/data

  frontend:
    image: ghcr.io/k3rnl/cagnard-frontend:${CAGNARD_VERSION:-v0.6.2}
    environment:
      CAGNARD_API_UPSTREAM: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      - backend
