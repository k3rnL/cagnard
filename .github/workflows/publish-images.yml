name: Publish Images

on:
  workflow_dispatch:
    inputs:
      registry:
        description: Container registry host
        required: true
        default: ghcr.io
      image_namespace:
        description: Registry namespace or organization
        required: false
        default: ""
      image_tag:
        description: Image tag to publish
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish images
    runs-on: ubuntu-latest

    env:
      REGISTRY: ${{ inputs.registry || 'ghcr.io' }}
      IMAGE_NAMESPACE: ${{ inputs.image_namespace || github.repository_owner }}
      IMAGE_TAG: ${{ inputs.image_tag || github.ref_name || github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to registry
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN || github.token }}
        run: |
          printf '%s' "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build and push backend image
        run: |
          docker build -f Containerfile.backend -t "$REGISTRY/$IMAGE_NAMESPACE/cagnard-backend:$IMAGE_TAG" .
          docker push "$REGISTRY/$IMAGE_NAMESPACE/cagnard-backend:$IMAGE_TAG"

      - name: Build and push frontend image
        run: |
          docker build -f frontend/Containerfile -t "$REGISTRY/$IMAGE_NAMESPACE/cagnard-frontend:$IMAGE_TAG" .
          docker push "$REGISTRY/$IMAGE_NAMESPACE/cagnard-frontend:$IMAGE_TAG"
