name: Publish Release Artifacts

on:
  workflow_dispatch:
    inputs:
      registry:
        description: Container registry host
        required: true
        default: ghcr.io
      image_namespace:
        description: Registry namespace or organization
        required: false
        default: ""
      image_tag:
        description: Image tag to publish
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest

    env:
      REGISTRY: ${{ inputs.registry || 'ghcr.io' }}
      IMAGE_NAMESPACE: ${{ inputs.image_namespace || github.repository_owner }}
      IMAGE_TAG: ${{ inputs.image_tag || github.ref_name || github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image names
        run: |
          image_namespace="$(printf '%s' "$IMAGE_NAMESPACE" | tr '[:upper:]' '[:lower:]')"
          image_tag="$(printf '%s' "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')"
          chart_version="$(awk '$1 == "version:" { print $2 }' deploy/helm/cagnard/Chart.yaml | tr -d '"')"
          release_tag=""
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
          elif [[ "${GITHUB_EVENT_NAME:-}" == "workflow_dispatch" && "$image_tag" == v* ]]; then
            release_tag="$image_tag"
          fi

          echo "IMAGE_NAMESPACE=$image_namespace" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$image_tag" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "CHART_VERSION=$chart_version" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$REGISTRY/$image_namespace/cagnard-backend:$image_tag" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$REGISTRY/$image_namespace/cagnard-frontend:$image_tag" >> "$GITHUB_ENV"
          echo "CHART_REPOSITORY=oci://$REGISTRY/$image_namespace/charts" >> "$GITHUB_ENV"
          echo "CHART_IMAGE=$REGISTRY/$image_namespace/charts/cagnard:$chart_version" >> "$GITHUB_ENV"

      - name: Log in to registry
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN || github.token }}
        run: |
          printf '%s' "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build and push backend image
        run: |
          docker build -f Containerfile.backend -t "$BACKEND_IMAGE" .
          docker push "$BACKEND_IMAGE"

      - name: Build and push frontend image
        run: |
          docker build -f frontend/Containerfile -t "$FRONTEND_IMAGE" .
          docker push "$FRONTEND_IMAGE"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN || github.token }}
        run: |
          printf '%s' "$REGISTRY_TOKEN" | helm registry login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin
          helm lint deploy/helm/cagnard
          mkdir -p dist
          helm package deploy/helm/cagnard --destination dist
          helm push "dist/cagnard-$CHART_VERSION.tgz" "$CHART_REPOSITORY"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && startsWith(inputs.image_tag, 'v'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags --force
          target_commitish="$(git rev-list -n 1 "$RELEASE_TAG" 2>/dev/null || printf '%s' "$GITHUB_SHA")"
          release_notes="$(mktemp)"
          generated_notes="$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$target_commitish" \
            --jq '.body')"

          {
            echo "## Container Images"
            echo
            echo "- \`$BACKEND_IMAGE\` (Go backend runtime)"
            echo "- \`$FRONTEND_IMAGE\`"
            echo
            echo "## Helm Chart"
            echo
            echo "- \`$CHART_IMAGE\`"
            echo
            echo "Install with:"
            echo
            echo "\`\`\`bash"
            echo "helm install cagnard $CHART_REPOSITORY/cagnard --version $CHART_VERSION"
            echo "\`\`\`"
            echo
            printf '%s\n' "$generated_notes"
          } > "$release_notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Cagnard $RELEASE_TAG" \
              --notes-file "$release_notes" \
              --latest
          else
            gh release create "$RELEASE_TAG" \
              --title "Cagnard $RELEASE_TAG" \
              --notes-file "$release_notes" \
              --verify-tag \
              --latest
          fi
