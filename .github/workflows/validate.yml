name: Validate

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".dockerignore"
      - "backend-go/**"
      - "config/**"
      - "deploy/**"
      - "docs/**"
      - "assets/**"
      - "examples/**"
      - "frontend/**"
      - "openspec/**"
      - "scripts/**"
      - "Containerfile.backend"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - ".dockerignore"
      - "backend-go/**"
      - "config/**"
      - "deploy/**"
      - "docs/**"
      - "assets/**"
      - "examples/**"
      - "frontend/**"
      - "openspec/**"
      - "scripts/**"
      - "Containerfile.backend"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate application and deployment artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        working-directory: backend-go
        run: go test ./...

      - name: Run frontend typecheck
        run: pnpm --filter @cagnard/frontend typecheck

      - name: Run frontend tests
        run: pnpm --filter @cagnard/frontend test

      - name: Build frontend
        run: pnpm --filter @cagnard/frontend build

      - name: Build backend image
        run: docker build -f Containerfile.backend -t cagnard-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Containerfile -t cagnard-frontend:ci .

      - name: Validate Docker Compose examples
        run: pnpm examples:compose:check

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/cagnard

      - name: Render Helm chart with defaults
        run: helm template cagnard deploy/helm/cagnard

      - name: Render Helm chart with example values
        run: pnpm examples:helm:check

      - name: Validate documentation links and assets
        run: pnpm docs:check
